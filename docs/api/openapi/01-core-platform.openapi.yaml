openapi: 3.1.0
info:
  title: eHRM Core Platform API
  version: 1.0.0
  description: Phase 1 API specification for Identity, Organization, Employee Master, Contract, Document, Configuration, and Audit.
servers:
  - url: /api/v1
security:
  - BearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Organization
  - name: Employees
  - name: Contracts
  - name: EmployeeDocuments
  - name: Configuration
  - name: AuditLogs
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string}
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paged users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserResponse'
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /users/{user_id}/roles:
    post:
      tags: [Roles]
      summary: Assign role with data scope
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '200':
          description: Role assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /branches:
    get:
      tags: [Organization]
      summary: List branches
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedBranchResponse'
    post:
      tags: [Organization]
      summary: Create branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchRequest'
      responses:
        '201':
          description: Branch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
  /departments:
    post:
      tags: [Organization]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '201':
          description: Department created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
  /positions:
    post:
      tags: [Organization]
      summary: Create position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePositionRequest'
      responses:
        '201':
          description: Position created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionResponse'
  /employees:
    get:
      tags: [Employees]
      summary: List employees
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paged employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEmployeeResponse'
    post:
      tags: [Employees]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /employees/{employee_id}:
    get:
      tags: [Employees]
      summary: Get employee detail
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
  /employees/{employee_id}/status-changes:
    post:
      tags: [Employees]
      summary: Change employee status
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmployeeStatusRequest'
      responses:
        '200':
          description: Employee status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
  /employee-contracts:
    post:
      tags: [Contracts]
      summary: Create contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '201':
          description: Contract created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractResponse'
  /employee-contracts/{contract_id}/renew:
    post:
      tags: [Contracts]
      summary: Renew contract
      parameters:
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewContractRequest'
      responses:
        '200':
          description: Contract renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractResponse'
  /employee-documents:
    post:
      tags: [EmployeeDocuments]
      summary: Upload employee document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [employee_id, document_type_id, file]
              properties:
                employee_id: {type: string, format: uuid}
                document_type_id: {type: string, format: uuid}
                issue_date: {type: string, format: date}
                expiry_date: {type: string, format: date}
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDocumentResponse'
  /employee-documents/{document_id}/download:
    get:
      tags: [EmployeeDocuments]
      summary: Get document download URL
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Presigned download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url: {type: string, format: uri}
  /lookups:
    get:
      tags: [Configuration]
      summary: List lookup groups and values
      responses:
        '200':
          description: Lookup list
          content:
            application/json:
              schema:
                type: object
  /audit-logs:
    get:
      tags: [AuditLogs]
      summary: Search audit logs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paged audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditLogResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema: {type: integer, minimum: 1, default: 1}
    PerPage:
      name: per_page
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
    UserId:
      name: user_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    EmployeeId:
      name: employee_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    ContractId:
      name: contract_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    DocumentId:
      name: document_id
      in: path
      required: true
      schema: {type: string, format: uuid}
  responses:
    UnauthorizedError:
      description: Unauthenticated
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: {type: string}
            message: {type: string}
            details:
              type: array
              items:
                type: object
                properties:
                  field: {type: string}
                  message: {type: string}
            trace_id: {type: string, format: uuid}
    MetaPage:
      type: object
      properties:
        current_page: {type: integer}
        per_page: {type: integer}
        total: {type: integer}
        last_page: {type: integer}
    LinkPage:
      type: object
      properties:
        first: {type: string, nullable: true}
        last: {type: string, nullable: true}
        prev: {type: string, nullable: true}
        next: {type: string, nullable: true}
    User:
      type: object
      properties:
        id: {type: string, format: uuid}
        employee_id: {type: string, format: uuid, nullable: true}
        name: {type: string}
        email: {type: string, format: email}
        status: {type: string}
    RoleAssignment:
      type: object
      properties:
        role_id: {type: string, format: uuid}
        role_code: {type: string}
        data_scope: {type: string}
    Employee:
      type: object
      properties:
        id: {type: string, format: uuid}
        employee_code: {type: string}
        full_name: {type: string}
        branch_id: {type: string, format: uuid}
        department_id: {type: string, format: uuid}
        position_id: {type: string, format: uuid}
        manager_id: {type: string, format: uuid, nullable: true}
        status: {type: string}
    Contract:
      type: object
      properties:
        id: {type: string, format: uuid}
        employee_id: {type: string, format: uuid}
        contract_number: {type: string}
        contract_type_id: {type: string, format: uuid}
        start_date: {type: string, format: date}
        end_date: {type: string, format: date, nullable: true}
        status: {type: string}
    EmployeeDocument:
      type: object
      properties:
        id: {type: string, format: uuid}
        employee_id: {type: string, format: uuid}
        document_type_id: {type: string, format: uuid}
        status: {type: string}
    Branch:
      type: object
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        active: {type: boolean}
    Department:
      type: object
      properties:
        id: {type: string, format: uuid}
        branch_id: {type: string, format: uuid}
        parent_id: {type: string, format: uuid, nullable: true}
        code: {type: string}
        name: {type: string}
        active: {type: boolean}
    Position:
      type: object
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        grade: {type: string, nullable: true}
        active: {type: boolean}
    AuditLog:
      type: object
      properties:
        id: {type: string, format: uuid}
        action: {type: string}
        module: {type: string}
        entity_type: {type: string}
        entity_id: {type: string, format: uuid}
        occurred_at: {type: string, format: date-time}
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            access_token: {type: string}
            token_type: {type: string, example: Bearer}
            user: {$ref: '#/components/schemas/User'}
    UserResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/User'}
    EmployeeResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/Employee'}
    ContractResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/Contract'}
    EmployeeDocumentResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/EmployeeDocument'}
    BranchResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/Branch'}
    DepartmentResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/Department'}
    PositionResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/Position'}
    PagedUserResponse:
      type: object
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/User'}
        meta: {$ref: '#/components/schemas/MetaPage'}
        links: {$ref: '#/components/schemas/LinkPage'}
    PagedEmployeeResponse:
      type: object
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/Employee'}
        meta: {$ref: '#/components/schemas/MetaPage'}
        links: {$ref: '#/components/schemas/LinkPage'}
    PagedBranchResponse:
      type: object
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/Branch'}
        meta: {$ref: '#/components/schemas/MetaPage'}
        links: {$ref: '#/components/schemas/LinkPage'}
    PagedAuditLogResponse:
      type: object
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/AuditLog'}
        meta: {$ref: '#/components/schemas/MetaPage'}
        links: {$ref: '#/components/schemas/LinkPage'}
    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name: {type: string}
        email: {type: string, format: email}
        password: {type: string, minLength: 8}
        employee_id: {type: string, format: uuid, nullable: true}
    AssignRoleRequest:
      type: object
      required: [role_id, scope_type]
      properties:
        role_id: {type: string, format: uuid}
        scope_type: {type: string, enum: [self, direct_reports, department, branch, all_company]}
        branch_id: {type: string, format: uuid, nullable: true}
        department_id: {type: string, format: uuid, nullable: true}
    CreateBranchRequest:
      type: object
      required: [code, name]
      properties:
        code: {type: string}
        name: {type: string}
        address: {type: string, nullable: true}
    CreateDepartmentRequest:
      type: object
      required: [branch_id, code, name]
      properties:
        branch_id: {type: string, format: uuid}
        parent_id: {type: string, format: uuid, nullable: true}
        code: {type: string}
        name: {type: string}
    CreatePositionRequest:
      type: object
      required: [code, name]
      properties:
        code: {type: string}
        name: {type: string}
        grade: {type: string, nullable: true}
    CreateEmployeeRequest:
      type: object
      required: [full_name, branch_id, department_id, position_id, hire_date, employment_type]
      properties:
        full_name: {type: string}
        dob: {type: string, format: date, nullable: true}
        gender: {type: string, nullable: true}
        personal_email: {type: string, format: email, nullable: true}
        work_email: {type: string, format: email, nullable: true}
        phone: {type: string, nullable: true}
        address: {type: string, nullable: true}
        branch_id: {type: string, format: uuid}
        department_id: {type: string, format: uuid}
        position_id: {type: string, format: uuid}
        manager_id: {type: string, format: uuid, nullable: true}
        hire_date: {type: string, format: date}
        employment_type: {type: string}
        status: {type: string, nullable: true}
    ChangeEmployeeStatusRequest:
      type: object
      required: [status, effective_date]
      properties:
        status: {type: string}
        effective_date: {type: string, format: date}
        reason: {type: string, nullable: true}
    CreateContractRequest:
      type: object
      required: [employee_id, contract_type_id, start_date]
      properties:
        employee_id: {type: string, format: uuid}
        contract_type_id: {type: string, format: uuid}
        contract_number: {type: string, nullable: true}
        start_date: {type: string, format: date}
        end_date: {type: string, format: date, nullable: true}
        sign_date: {type: string, format: date, nullable: true}
    RenewContractRequest:
      type: object
      required: [start_date]
      properties:
        start_date: {type: string, format: date}
        end_date: {type: string, format: date, nullable: true}
        sign_date: {type: string, format: date, nullable: true}
